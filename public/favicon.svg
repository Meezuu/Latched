<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <clipPath id="clip"><circle cx="32" cy="32" r="32"/></clipPath>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.75" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#060410"/>

  <!-- Geometry -->
  <g clip-path="url(#clip)" filter="url(#glow)" stroke="white" fill="none" stroke-linecap="round" opacity="0.85">
    <!-- 8 circles at radius 14 -->
    <circle cx="32"    cy="18"    r="4" stroke-width="1"    stroke-dasharray="1 2.8"/>
    <circle cx="41.9"  cy="22.1"  r="4" stroke-width="1"    stroke-dasharray="1 2.8"/>
    <circle cx="46"    cy="32"    r="4" stroke-width="1"    stroke-dasharray="1 2.8"/>
    <circle cx="41.9"  cy="41.9"  r="4" stroke-width="1"    stroke-dasharray="1 2.8"/>
    <circle cx="32"    cy="46"    r="4" stroke-width="1"    stroke-dasharray="1 2.8"/>
    <circle cx="22.1"  cy="41.9"  r="4" stroke-width="1"    stroke-dasharray="1 2.8"/>
    <circle cx="18"    cy="32"    r="4" stroke-width="1"    stroke-dasharray="1 2.8"/>
    <circle cx="22.1"  cy="22.1"  r="4" stroke-width="1"    stroke-dasharray="1 2.8"/>

    <!-- Connecting arcs (quadratic bezier, control point pulled toward center) -->
    <path stroke-width="0.75" stroke-dasharray="0.6 2.2" d="
      M32,18    Q38.3,19.5 41.9,22.1
      M41.9,22.1 Q44.5,28.3 46,32
      M46,32    Q44.5,35.7 41.9,41.9
      M41.9,41.9 Q38.3,44.5 32,46
      M32,46    Q25.7,44.5 22.1,41.9
      M22.1,41.9 Q19.5,35.7 18,32
      M18,32    Q19.5,28.3 22.1,22.1
      M22.1,22.1 Q25.7,19.5 32,18
    "/>

    <!-- Central diamond -->
    <path stroke-width="1" stroke-dasharray="1 2.8" d="M32,25.5 L38.5,32 L32,38.5 L25.5,32 Z"/>
  </g>
</svg>
